app.medias.storage.adverts = announces
app.medias.storage.profiles = profiles
app.medias.storage.icons = icons



#data source
spring.datasource.url=jdbc:h2:mem:mediadb
spring.h2.console.enabled=true

#cloudinary url for medias storing
CLOUDINARY_URL=${CLOUDINARY_URL}

#cloudflare R2 storage
app.storage.r2.endpoint=${R2_ENDPOINT}
app.storage.r2.access-key=${R2_ACCESS_KEY}
app.storage.r2.secret-key=${R2_SECRET_KEY}
app.storage.r2.bucket=${R2_BUCKET}
app.storage.r2.region=${R2_REGION:auto}
app.storage.r2.public-base-url=${R2_PUBLIC_BASE_URL:https://cdn.adryvo.com}

# authorized mime type
mimetypes=${MIME_TYPES:image/png;image/jpeg;image/jpg;image/webp;image/gif}
