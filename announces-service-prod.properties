spring.datasource.url=jdbc:mysql://localhost:3306/advertdb?createDatabaseIfNotExist=true


# Schedulers configs
# Tous les dimanches � 9h
schedulers.advertScheduler.search-weekly=0 0 9 * * Sun
schedulers.advertScheduler.search-daily=0 0 9 * * *

# GET publics (navigation anonyme). /announces/* = un seul segment => ne capte PAS /announces/me/ads
app.security.public-get-paths=/announces,/announces/*,/announces/id/**,/categories/**,/categoryFields/**,/announceTypes/**,/configs/**
# publics toutes méthodes : recherche anonyme (POST) + tracking anonyme
app.security.public-paths=/announces/search,/tracking/**
app.security.public-get-paths=…, /swagger-ui/**, /swagger-ui.html, /v3/api-docs/**